services:
  proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - dt-network
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - dt-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Explicit DNS — Docker's default resolver can flake when the host
    # DNS misbehaves, which makes the backend's outbound HTTP calls fail
    # (cURL error 6: could not resolve host). Cloudflare 1.1.1.1 + Google
    # 8.8.8.8 are reliable fallbacks.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      APP_NAME: DietTracker
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dt
      DB_USERNAME: dt
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-https://api.anthropic.com}
      ANTHROPIC_AUTH_STYLE: ${ANTHROPIC_AUTH_STYLE:-anthropic}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-2048}
    secrets:
      - db_password
    networks:
      - dt-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dt
      POSTGRES_USER: dt
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - dt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dt -d dt"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: dt
      POSTGRES_USER: dt
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    secrets:
      - db_password
    volumes:
      - ./backups:/backups
    networks:
      - dt-network
    depends_on:
      db:
        condition: service_healthy

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  dt-network:
    driver: bridge
